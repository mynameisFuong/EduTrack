services:
  postgres:
    image: postgres:16-alpine
    container_name: ttcs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-facility_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-facility_management}"]
      interval: 5s
      timeout: 5s
      retries: 10

  seed:
    image: ${DOCKERHUB_NAMESPACE:-mynameisfuong}/edutrack-backend:${IMAGE_TAG:-latest}
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@postgres:5432/${POSTGRES_DB:-facility_management}
      JWT_SECRET: ${JWT_SECRET:-facility_management_secret_key}
      SEED_IF_EMPTY: "true"
    command: sh -c "npx prisma migrate deploy && npm run prisma:seed"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    image: ${DOCKERHUB_NAMESPACE:-mynameisfuong}/edutrack-backend:${IMAGE_TAG:-latest}
    container_name: ttcs-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@postgres:5432/${POSTGRES_DB:-facility_management}
      JWT_SECRET: ${JWT_SECRET:-facility_management_secret_key}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "${BACKEND_HOST:-127.0.0.1}:${BACKEND_PORT:-5050}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

  frontend:
    image: ${DOCKERHUB_NAMESPACE:-mynameisfuong}/edutrack-frontend:${IMAGE_TAG:-latest}
    container_name: ttcs-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST:-127.0.0.1}:${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
