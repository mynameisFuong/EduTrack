services:
  postgres:
    image: postgres:16-alpine
    container_name: ttcs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: facility_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d facility_management"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ttcs-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/facility_management
      JWT_SECRET: facility_management_secret_key
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "127.0.0.1:5050:5000"
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: ttcs-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - backend

  seed:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/facility_management
      JWT_SECRET: facility_management_secret_key
      SEED_IF_EMPTY: "true"
    command: sh -c "npx prisma migrate deploy && npm run prisma:seed"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
